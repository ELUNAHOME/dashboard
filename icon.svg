<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <rect width="100" height="100" fill="#F0EDE8"/>
  <!-- House+tree icon — beige background, dark charcoal lines -->
  <g stroke="#2A2A2A" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Tree trunk (vertical, doubles as left wall) -->
    <line x1="42" y1="16" x2="42" y2="70"/>
    <!-- Branch 1 (lower-left) -->
    <line x1="42" y1="44" x2="30" y2="33"/>
    <!-- Branch 2 (upper-left) -->
    <line x1="42" y1="35" x2="31" y2="24"/>
    <!-- Roof right slope: peak at top of trunk, down to right -->
    <line x1="42" y1="26" x2="67" y2="48"/>
    <!-- Right wall -->
    <line x1="67" y1="48" x2="67" y2="70"/>
    <!-- Floor -->
    <line x1="42" y1="70" x2="67" y2="70"/>
    <!-- Door -->
    <rect x="50" y="56" width="10" height="14" rx="1"/>
    <!-- Ground curve -->
    <path d="M28 72 Q47 78 72 72" stroke-width="3.5"/>
  </g>
</svg>
