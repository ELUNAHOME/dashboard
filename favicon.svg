<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" fill="#F0EDE8"/>
  <g stroke="#1C1C1C" stroke-linecap="round" stroke-linejoin="round" fill="none" stroke-width="2.8">
    <!-- Ground curve -->
    <path d="M 19 73 Q 48 78 79 73"/>
    <!-- Tree trunk -->
    <line x1="42" y1="14" x2="42" y2="73"/>
    <!-- Upper branches -->
    <line x1="42" y1="22" x2="34" y2="14"/>
    <line x1="42" y1="22" x2="50" y2="14"/>
    <!-- Lower branches -->
    <line x1="42" y1="36" x2="27" y2="49"/>
    <line x1="42" y1="36" x2="55" y2="29"/>
    <!-- House left wall diagonal -->
    <line x1="30" y1="57" x2="42" y2="36"/>
    <!-- House roof + right wall with rounded top-right corner -->
    <path d="M 42 36 L 69 30 Q 76 30 76 37 L 76 73"/>
    <!-- Door arch -->
    <path stroke-width="2.5" d="M 60 73 L 60 63 Q 60 58 64.5 58 Q 69 58 69 63 L 69 73"/>
  </g>
</svg>
