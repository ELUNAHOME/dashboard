<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <g stroke="#1C1C1C" stroke-linecap="round" stroke-linejoin="round" fill="none" stroke-width="5.5">

    <!-- Tree trunk: runs from top all the way to ground, pierces roof peak -->
    <line x1="38" y1="10" x2="38" y2="78"/>

    <!-- Top branches (above roof) — pointing upper-left -->
    <line x1="38" y1="18" x2="26" y2="10"/>
    <line x1="38" y1="18" x2="46" y2="10"/>

    <!-- Mid branches -->
    <line x1="38" y1="30" x2="22" y2="20"/>
    <line x1="38" y1="30" x2="50" y2="22"/>

    <!-- Lower branch (at roof peak level) -->
    <line x1="38" y1="42" x2="24" y2="33"/>

    <!-- House: roof starts at trunk intersection, slopes right, rounded corner → right wall down → rounded base corner -->
    <path d="M 38 42 L 70 27 Q 78 27 78 35 L 78 68 Q 78 78 70 78"/>

    <!-- Left house wall (short — from roof-left down to ground) -->
    <line x1="28" y1="57" x2="38" y2="42"/>

    <!-- Door arch -->
    <path stroke-width="4" d="M 60 78 L 60 67 Q 60 61 65 61 Q 70 61 70 67 L 70 78"/>

    <!-- Ground curve -->
    <path d="M 18 78 Q 48 86 80 77"/>
  </g>
</svg>
